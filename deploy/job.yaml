---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: segment-bridge
spec:
  failedJobsHistoryLimit: 10
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - command:
                - main-job.sh
              env:
                - name: CURL_NETRC
                  value: /usr/local/etc/netrc/netrc
                - name: KUBECONFIG
                  value: /usr/local/etc/kube-config/kube-config
              image: >-
                image-registry.openshift-image-registry.svc:5000/rhtap-o11y--runtime-int/segment-bridge-job
              imagePullPolicy: Always
              name: segment-bridge
              tty: true
              volumeMounts:
                - mountPath: /usr/local/etc/netrc
                  name: netrc
                  readOnly: true
                - mountPath: /usr/local/etc/kube-config
                  name: kube-config
                  readOnly: true
          restartPolicy: Never
          volumes:
            - name: netrc
              secret:
                secretName: netrc
            - name: kube-config
              secret:
                secretName: kube-config
  schedule: '@hourly'
  successfulJobsHistoryLimit: 3
